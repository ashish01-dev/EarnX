kind = "web"
previewPath = "/"
title = "EarnX"
version = "1.0.0"
id = "artifacts/earnx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19216

[services.development]
run = "pnpm --filter @workspace/earnx run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/earnx", "run", "build" ]
publicDir = "artifacts/earnx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19216"
BASE_PATH = "/"
